# Production deploy for **nordoravital** (Vercel team: woodlandwonderstudioetsy).
# Dashboard: project **nordoravital** → www.nordoravital.com
#
# If the site stays on an old commit while `main` moves, Git→Vercel auto-build is often
# paused, wrong repo/branch, or the wrong Vercel team. This workflow is a backup that
# always runs on pushes to `main`.
#
# RECOMMENDED: set VERCEL_DEPLOY_HOOK (Vercel → Project → Settings → Git → Deploy Hooks
# → branch `main`). Hooks trigger a production build from the latest Git revision — most
# reliable when the native Git integration is flaky.
#
# ALTERNATIVE secrets (same as `vercel deploy --prod`): VERCEL_TOKEN, VERCEL_ORG_ID,
# VERCEL_PROJECT_ID from the **woodlandwonderstudioetsy** team / **nordoravital** project.

name: Deploy production (Vercel)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Choose deploy method
        id: pick
        env:
          HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          if [ -n "${HOOK}" ]; then
            echo "method=hook" >> "$GITHUB_OUTPUT"
          else
            echo "method=token" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy via Vercel deploy hook
        if: steps.pick.outputs.method == 'hook'
        env:
          HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          curl -fsS -X POST "$HOOK"
          echo "Deploy hook accepted (build runs on Vercel)."

      - name: Deploy via Vercel token (CLI)
        if: steps.pick.outputs.method == 'token'
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: "--prod"
