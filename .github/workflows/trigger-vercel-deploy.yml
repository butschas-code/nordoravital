# Production deploy on every push to `main`.
#
# Your repo path is correct: this file lives in the Next.js app root that pushes to
# `butschas-code/nordoravital`. The issue was a local Vercel CLI logged into a
# different team (gustafsonmarketing), not the project for nordoravital.com.
#
# Configure ONE of these in GitHub → Settings → Secrets and variables → Actions:
#
# A) Recommended — Vercel token deploy (same as `vercel deploy --prod` from CI)
#    - Vercel → Team that owns nordoravital.com → Project → Settings → General:
#      copy "Project ID" and (Team) "Team ID" (or use `vercel link` locally with
#      the RIGHT account and read `.vercel/project.json`).
#    - Vercel → Account Settings → Tokens → create token.
#    Secrets: VERCEL_TOKEN, VERCEL_ORG_ID (team id), VERCEL_PROJECT_ID
#
# B) Deploy Hook — Vercel → Project → Settings → Git → Deploy Hooks → main
#    Secret: VERCEL_DEPLOY_HOOK = full hook URL
#
# If (A) fails (e.g. secrets not set yet), we try (B). If both missing, the job fails.

name: Deploy production (Vercel)

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy with Vercel token
        id: vercel_token
        continue-on-error: true
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: "--prod"

      - name: Fallback — deploy hook
        if: steps.vercel_token.outcome == 'failure'
        env:
          HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "::error::Configure GitHub Actions secrets: either VERCEL_TOKEN + VERCEL_ORG_ID + VERCEL_PROJECT_ID, or VERCEL_DEPLOY_HOOK. See workflow header in .github/workflows/trigger-vercel-deploy.yml"
            exit 1
          fi
          curl -fsS -X POST "$HOOK"
          echo "Deploy hook OK."
