# After push to main, POSTs your Vercel *Deploy Hook* so production rebuilds
# even if the Git integration is mis-linked or stuck.
#
# One-time setup (project that serves nordoravital.com):
#   Vercel → that project → Settings → Git → Deploy Hooks
#   → Create Hook (Branch: main) → copy URL
#   GitHub → repo → Settings → Secrets and variables → Actions
#   → New repository secret: VERCEL_DEPLOY_HOOK = <paste URL>
#
# If the secret is missing, this workflow exits 0 and does nothing (no failed checks).

name: Trigger Vercel production deploy

on:
  push:
    branches: [main]

jobs:
  hook:
    runs-on: ubuntu-latest
    steps:
      - name: POST deploy hook
        env:
          HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "Skip: add repository secret VERCEL_DEPLOY_HOOK (Vercel → Deploy Hooks)."
            exit 0
          fi
          curl -fsS -X POST "$HOOK"
          echo "Deploy hook triggered."
